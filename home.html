/* ============ ParticleField: generative gold constellation on navy ============ */
function ParticleField({ className, density = 1, interactive = true }) {
  const canvasRef = React.useRef(null);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    let w = 0, h = 0, raf = null, pts = [];
    const mouse = { x: -9999, y: -9999 };
    const LINK = 110;

    const build = () => {
      w = canvas.offsetWidth; h = canvas.offsetHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const n = Math.max(40, Math.round(((w * h) / 16000) * density));
      pts = Array.from({ length: n }, () => ({
        x: Math.random() * w, y: Math.random() * h,
        vx: 0, vy: 0, r: 0.6 + Math.random() * 1.6,
        twp: Math.random() * Math.PI * 2,        // twinkle phase
        tws: 0.5 + Math.random() * 1.8,          // twinkle speed
      }));
    };
    build();

    let t = 0;
    const step = () => {
      t += 0.004;
      const g = ctx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, "#0a0a0a");
      g.addColorStop(0.55, "#0e1524");
      g.addColorStop(1, "#0a0a0a");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);

      for (const p of pts) {
        const a = (Math.sin(p.x * 0.002 + t) + Math.cos(p.y * 0.0023 - t * 0.8)) * Math.PI;
        p.vx += Math.cos(a) * 0.012;
        p.vy += Math.sin(a) * 0.012;
        if (interactive) {
          const dx = p.x - mouse.x, dy = p.y - mouse.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 150 * 150 && d2 > 1) {
            const f = 0.6 / Math.sqrt(d2);
            p.vx += dx * f * 0.06;
            p.vy += dy * f * 0.06;
          }
        }
        p.vx *= 0.96; p.vy *= 0.96;
        p.x += p.vx; p.y += p.vy;
        if (p.x < -20) p.x = w + 20; if (p.x > w + 20) p.x = -20;
        if (p.y < -20) p.y = h + 20; if (p.y > h + 20) p.y = -20;
      }

      ctx.lineWidth = 1;
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d2 = dx * dx + dy * dy;
          if (d2 < LINK * LINK) {
            const alpha = 0.10 * (1 - Math.sqrt(d2) / LINK);
            ctx.strokeStyle = `rgba(201,169,97,${alpha})`;
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }
      for (const p of pts) {
        // twinkle: dots pulse and shift from gold toward white light at their peak
        const tw = 0.5 + 0.5 * Math.sin(t * 14 * p.tws + p.twp);
        const k = tw * tw;
        const cr = Math.round(201 + 54 * k);
        const cg = Math.round(169 + 86 * k);
        const cb = Math.round(97 + 158 * k);
        const alpha = 0.16 + 0.5 * tw + p.r * 0.12;
        const rad = p.r * (0.8 + 0.4 * tw);
        if (k > 0.75 && p.r > 1.4) {
          // bright flash gets a soft white halo
          ctx.fillStyle = `rgba(255,255,255,${0.12 * k})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, rad * 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = `rgba(${cr},${cg},${cb},${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, rad, 0, Math.PI * 2);
        ctx.fill();
      }
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);

    const onMove = (e) => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
    };
    const onLeave = () => { mouse.x = -9999; mouse.y = -9999; };
    const onResize = () => build();
    if (interactive) {
      window.addEventListener("mousemove", onMove, { passive: true });
      window.addEventListener("mouseout", onLeave, { passive: true });
    }
    window.addEventListener("resize", onResize);

    return () => {
      if (raf) cancelAnimationFrame(raf);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseout", onLeave);
      window.removeEventListener("resize", onResize);
    };
  }, [density, interactive]);

  return <canvas ref={canvasRef} className={className} aria-hidden="true" />;
}

  const open = isDesktop && (pinned || hovered);

  React.useEffect(() => {
    const mq = window.matchMedia("(min-width: 768px)");
    const onChange = () => setIsDesktop(mq.matches);
    mq.addEventListener("change", onChange);
    return () => mq.removeEventListener("change", onChange);
  }, []);

  React.useEffect(() => {
    const ids = ["home", "capabilities", "serve", "insights"];
    const onScroll = () => {
      let cur = "home";
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.getBoundingClientRect().top <= window.innerHeight * 0.4) cur = id;
      }
      setActive(cur);

    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const items = [

    { id: "capabilities", label: "Services", href: "#capabilities", icon: "grid" },

    { id: "insights", label: "Insights", href: "#insights", icon: "book" },

    { id: "team", label: "Team", href: "team.html", icon: "user" },
    { id: "fees", label: "Fees", href: "fees.html", icon: "fees" },
    { id: "login", label: "Client Login", href: "login.html", icon: "lock" },
    { id: "call", label: "Schedule a Call", href: BOOKING, icon: "calendar", external: true, gold: true },

  return (
    <nav aria-label="Primary" className="fixed z-[60] bottom-2 left-1/2 -translate-x-1/2 md:bottom-auto md:left-4 md:top-1/2 md:translate-x-0 md:-translate-y-1/2">
      <div
        onMouseEnter={() => setHovered(true)}
        onMouseLeave={() => setHovered(false)}
        className="flex flex-row items-center md:flex-col md:items-stretch rounded-full md:rounded-[24px] border border-white/10 bg-surface/90 backdrop-blur-xl shadow-2xl shadow-black/60 overflow-hidden transition-[width] duration-300 ease-out px-2 py-1.5 md:px-0 md:py-2.5"

              <img src="logo/pam-mark.png" alt="" className="w-[24px] h-auto" />

                  className={"shrink-0 w-7 h-7 rounded-full hidden md:flex items-center justify-center text-muted hover:text-white hover:bg-white/10 transition-all duration-300 " +
                    (open ? "opacity-100" : "opacity-0 pointer-events-none")}>

                {it.label}

          )
        )}

    </nav>

/* ============ Bird → Branch → Logo (hero signature animation) ============ */
function BirdPerch({ ready, heroRef }) {
  const birdRef = React.useRef(null);
  const wingFarRef = React.useRef(null);
  const wingNearRef = React.useRef(null);
  const logoRef = React.useRef(null);
  const branchRef = React.useRef(null);

  React.useEffect(() => {
    if (!ready) return;
    const bird = birdRef.current, logo = logoRef.current, hero = heroRef.current;
    const branchPaths = branchRef.current.querySelectorAll(".branch-draw");
    const leaves = branchRef.current.querySelectorAll(".branch-leaf");
    const wings = [wingFarRef.current, wingNearRef.current];

    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) {
      gsap.set(logo, { opacity: 1 });
      gsap.set(branchPaths, { strokeDashoffset: 0 });
      gsap.set(leaves, { opacity: 1, scale: 1 });
      return;
    }

    let ctx = null;
    let cancelled = false;

    // if a real falcon photo exists, glide with it; otherwise use the SVG silhouette
    const probe = new Image();
    const start = (usePhoto) => {
      if (cancelled) return;
      ctx = gsap.context(() => {
        const photoEl = bird.querySelector(".bird-photo");
        const svgEl = bird.querySelector(".bird-svg");
        gsap.set(usePhoto ? photoEl : svgEl, { autoAlpha: 1 });
        gsap.set(usePhoto ? svgEl : photoEl, { autoAlpha: 0 });

        const heroRect = hero.getBoundingClientRect();
        const logoRect = logo.getBoundingClientRect();
        const W = heroRect.width, H = heroRect.height;
        // target = center of the logo perch
        const tx = logoRect.left - heroRect.left + logoRect.width / 2;
        const ty = logoRect.top - heroRect.top + logoRect.height / 2;

        branchPaths.forEach((p) => {
          const L = p.getTotalLength();
          gsap.set(p, { strokeDasharray: L, strokeDashoffset: L });
        });
        gsap.set(leaves, { opacity: 0, scale: 0, transformOrigin: "0% 100%" });
        gsap.set(logo, { opacity: 0 });
        // bird positions are CENTER coords (xPercent/yPercent -50); enters from the RIGHT
        gsap.set(bird, { xPercent: -50, yPercent: -50, opacity: 0, x: W * 1.10, y: H * 0.18, scale: 0.55, rotate: -3 });

        // slow, stately wing beat (SVG only — the photo glides with wings fixed)
        const flap = usePhoto ? null : gsap.to(wings, {
          rotate: (i) => (i === 0 ? 14 : -14),
          duration: 0.4, repeat: -1, yoyo: true, ease: "sine.inOut",
        });
        // photo: real wing beats — the two halves fold in 3D around the body line
        let ride = null;
        let wTop = null, wBot = null;
        if (usePhoto) {
          wTop = bird.querySelector(".bird-wing-top");
          wBot = bird.querySelector(".bird-wing-bot");
          ride = gsap.timeline({ repeat: -1, yoyo: true })
            .to(wTop, { rotationX: -38, duration: 0.4, ease: "sine.inOut" }, 0)
            .to(wBot, { rotationX: 30, duration: 0.4, ease: "sine.inOut" }, 0)
            .to(photoEl, { y: -8, duration: 0.4, ease: "sine.inOut" }, 0);
        }

        // gold/white spark burst at the perch when the falcon becomes the mark
        const burst = () => {
          const overlay = bird.parentElement;
          for (let i = 0; i < 18; i++) {
            const sp = document.createElement("span");
            const gold = i % 3 !== 0;
            sp.style.cssText =
              "position:absolute;left:" + tx + "px;top:" + ty + "px;width:" + (gold ? 4 : 3) +
              "px;height:" + (gold ? 4 : 3) + "px;border-radius:9999px;background:" +
              (gold ? "#C9A961" : "#FFFFFF") + ";pointer-events:none;";
            overlay.appendChild(sp);
            const a = Math.random() * Math.PI * 2;
            const d = 40 + Math.random() * 80;
            gsap.fromTo(sp, { x: 0, y: 0, opacity: 1, scale: 1 },
              { x: Math.cos(a) * d, y: Math.sin(a) * d - 20, opacity: 0, scale: 0.2,
                duration: 0.7 + Math.random() * 0.4, ease: "power2.out", onComplete: () => sp.remove() });
          }
        };

        const tl = gsap.timeline();
        // branch grows in while the falcon is on approach
        tl.to(branchPaths, { strokeDashoffset: 0, duration: 1.2, ease: "power2.inOut", stagger: 0.12 }, 0.3);
        tl.to(leaves, { opacity: 1, scale: 1, duration: 0.35, stagger: 0.07, ease: "back.out(2.5)" }, 1.1);

        // PHASE A — slow, proud glide in from the right, arriving directly ABOVE the branch
        tl.to(bird, { opacity: 1, duration: 0.4 }, 0.1);
        tl.to(bird, {
          keyframes: [
            { x: W * 0.72, y: H * 0.12, scale: 0.95, rotate: -4, duration: 1.6 },
            { x: tx, y: ty - H * 0.26, scale: 1.22, rotate: 0, duration: 1.5 },
          ],
          ease: "sine.inOut",
        }, 0.1);
        // PHASE B — hovers a beat, then descends STRAIGHT DOWN onto the branch,
        // wings still beating to brake the fall
        tl.to(bird, { y: ty - 6, scale: 0.66, rotate: 0, duration: 1.0, ease: "power1.inOut" });
        tl.add(() => {
          if (flap) {
            flap.kill();
            gsap.to(wings, { rotate: 0, duration: 0.25, ease: "power2.out" });
          }
          if (ride) {
            ride.kill();
            gsap.to([wTop, wBot], { rotationX: 0, duration: 0.3, ease: "power2.out" });
            gsap.to(photoEl, { y: 0, duration: 0.3, ease: "power2.out" });
          }
        }, "-=0.2");
        // touchdown
        tl.to(bird, { y: ty + 5, rotate: 0, duration: 0.16, ease: "power1.in" });
        tl.to(bird, { y: ty, duration: 0.2, ease: "power1.out" });
        // the falcon becomes the brand mark in a burst of light
        tl.add(burst, "+=0.1");
        tl.to(bird, { opacity: 0, scale: 0.42, duration: 0.32, ease: "power2.in" }, "<");
        tl.fromTo(logo,
          { opacity: 0, y: 10, scale: 0.7 },
          { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.8)" }, "<+0.1");
      }, hero);
    };
    probe.onload = () => start(true);
    probe.onerror = () => start(false);
    probe.src = "assets/img/falcon-glide.png";

    return () => { cancelled = true; if (ctx) ctx.revert(); };
  }, [ready]);

  return (
    <React.Fragment>
      {/* perch: branch + logo, sits above the headline */}
      <div className="relative w-[240px] md:w-[280px] h-[92px] md:h-[104px] mb-3 md:mb-4 flex items-end justify-center">

function Services() {
  const [index, setIndex] = React.useState(0);
  const [cw, setCw] = React.useState(0);
  const [cursor, setCursor] = React.useState({ x: 0, y: 0, on: false });
  const wrapRef = React.useRef(null);
  const hoverRef = React.useRef(false);
  const draggingRef = React.useRef(false);

  React.useEffect(() => {
    const measure = () => setCw(wrapRef.current ? wrapRef.current.offsetWidth : 0);
    measure();
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, []);

  React.useEffect(() => {
    const id = setInterval(() => {
      if (!hoverRef.current) setIndex((i) => (i + 1) % services.length);
    }, 5000);
    return () => clearInterval(id);
  }, []);

  const prev = () => setIndex((i) => (i - 1 + services.length) % services.length);
  const next = () => setIndex((i) => (i + 1) % services.length);

  const isMd = cw >= 640;
  const slideW = Math.round(cw * (isMd ? 0.76 : 0.88));
  const gap = isMd ? 28 : 14;
  const H = isMd ? 520 : 400;

  // signed circular offset from the active slide: -1 (left peek), 0 (center), 1 (right peek), 2 (hidden)
  const relOf = (i) => {
    let r = (((i - index) % services.length) + services.length) % services.length;
    if (r > 2) r -= services.length;
    return r;
  };

  return (
    <section id="capabilities" className="bg-bg pt-4 pb-12 md:pt-6 md:pb-16 overflow-hidden">
      <div className="max-w-[1200px] mx-auto px-6 md:px-24 xl:px-16">
        <SectionHeader
          eyebrow="What We Do"
          title="Four" italicWord="disciplines"
          subtext="One coordinated engagement — everything a serious portfolio needs, designed and executed under one roof."
          button={
            <GradientButton href="services.html" className="hidden md:inline-flex">
              All services <span aria-hidden="true">→</span>
            </GradientButton>
          }
        />
      </div>

      <div ref={wrapRef} className="relative w-full">
        {/* slide viewport — hidden native cursor, circular drag cursor instead */}
        <div className="relative overflow-hidden md:cursor-none" style={{ height: H + "px" }}
             onMouseEnter={() => { hoverRef.current = true; setCursor((c) => ({ ...c, on: true })); }}
             onMouseLeave={() => { hoverRef.current = false; setCursor((c) => ({ ...c, on: false })); }}
             onMouseMove={(e) => {
               const rect = wrapRef.current.getBoundingClientRect();
               setCursor({ x: e.clientX - rect.left, y: e.clientY - rect.top, on: true });
             }}>
          {cw > 0 && (
            <motion.div className="absolute inset-0"
              drag="x" dragConstraints={{ left: 0, right: 0 }} dragElastic={0.06}
              onDragStart={() => { draggingRef.current = true; }}
              onDragEnd={(e, info) => {
                setTimeout(() => { draggingRef.current = false; }, 50);
                if (info.offset.x < -70) next();
                else if (info.offset.x > 70) prev();
              }}>
              {services.map((s, i) => {
                const rel = relOf(i);
                const active = rel === 0;
                const hidden = Math.abs(rel) > 1;
                const x = Math.round(cw / 2 - slideW / 2 + rel * (slideW + gap));
                return (
                  <motion.div key={s.num}
                    initial={false}
                    animate={{ x, scale: active ? 1 : 0.94, opacity: hidden ? 0 : active ? 1 : 0.5 }}
                    transition={hidden ? { duration: 0 } : { type: "spring", stiffness: 160, damping: 25 }}
                    style={{ width: slideW + "px" }}
                    className="absolute top-0 h-full rounded-[28px] overflow-hidden border border-stroke bg-surface select-none">
                    {/* click layer: inactive slides snap into focus; active slide navigates */}
                    {active ? (
                      <a href={s.href} draggable="false" aria-label={s.title}
                         onClick={(e) => { if (draggingRef.current) e.preventDefault(); }}
                         className="absolute inset-0 z-20" />
                    ) : (
                      <button onClick={() => { if (!draggingRef.current) setIndex(i); }}
                              className="absolute inset-0 z-20" aria-label={"Show " + s.title} />
                    )}

                    <img src={s.img} alt={s.title} loading="lazy" draggable="false"
                         className="absolute inset-0 w-full h-full object-cover"
                         style={{ objectPosition: s.pos || "50% 50%" }} />
                    <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/25 to-black/10" />

                    {/* tag chip — top left */}
                    <div className="absolute top-5 left-5 md:top-8 md:left-8 z-10">
                      <span className="inline-flex items-center gap-2 rounded-full border border-white/25 bg-black/30 backdrop-blur-md px-4 py-1.5 text-[11px] uppercase tracking-[0.2em] text-white/90 font-body">
                        <span className="w-1.5 h-1.5 rounded-full accent-gradient" />
                        {s.tag}
                      </span>
                    </div>

                    {/* title block — bottom left, bold sans like the reference */}
                    <div className="absolute bottom-0 left-0 right-0 z-10 p-6 md:p-10">
                      <div className="flex items-center gap-2 mb-3" aria-hidden="true">
                        {services.map((_, d) => (
                          <span key={d}
                            className={"rounded-full transition-all duration-300 " +
                              (d === i ? "w-2.5 h-2.5 accent-gradient" : "w-1.5 h-1.5 bg-white/40")} />
                        ))}
                      </div>
                      <h3 className="text-3xl md:text-6xl font-body font-bold tracking-tight text-white leading-[1.05] mb-3 max-w-2xl">
                        {s.title}
                      </h3>
                      <motion.div initial={false}
                        animate={{ opacity: active ? 1 : 0, y: active ? 0 : 12 }}
                        transition={{ duration: 0.45, delay: active ? 0.15 : 0 }}
                        className="flex flex-col md:flex-row md:items-center gap-4 md:gap-8">
                        <p className="text-sm md:text-base text-white/75 font-body max-w-md">{s.desc}</p>
                        <span className="inline-flex items-center gap-2 text-sm font-body text-white whitespace-nowrap">
                          <span className="w-8 h-px accent-gradient" /> Explore <span aria-hidden="true">→</span>
                        </span>
                      </motion.div>
                    </div>
                  </motion.div>
                );
              })}
            </motion.div>
          )}

          {/* circular drag cursor */}
          <motion.div
            className="pointer-events-none absolute top-0 left-0 z-40 hidden md:flex items-center justify-center w-24 h-24 rounded-full border border-white/80 bg-black/10 backdrop-blur-[2px] text-[10px] tracking-[0.3em] uppercase text-white font-body"
            initial={false}
            animate={{ x: cursor.x - 48, y: cursor.y - 48, opacity: cursor.on ? 1 : 0, scale: cursor.on ? 1 : 0.4 }}
            transition={{ x: { type: "spring", stiffness: 260, damping: 24, mass: 0.55 },
                          y: { type: "spring", stiffness: 260, damping: 24, mass: 0.55 },
                          opacity: { duration: 0.2 }, scale: { duration: 0.25 } }}>
            Drag
          </motion.div>
        </div>

        {/* controls */}
        <div className="max-w-[1200px] mx-auto px-6 md:px-24 xl:px-16 mt-8 flex items-center justify-between">
          <div className="flex items-center gap-4">
            {services.map((s, i) => (
              <button key={s.num} onClick={() => setIndex(i)} aria-label={"Show " + s.title}
                className="relative w-6 h-6 flex items-center justify-center group">
                <span className={"rounded-full transition-all duration-300 " +
                  (i === index ? "w-2.5 h-2.5 accent-gradient" : "w-2 h-2 bg-stroke group-hover:bg-white/50")} />
                {i === index && (
                  <svg key={"ring" + index} viewBox="0 0 24 24" className="absolute inset-0 w-full h-full -rotate-90">
                    <circle cx="12" cy="12" r="10" fill="none" stroke="hsl(var(--stroke))" strokeWidth="1.5" />
                    <motion.circle cx="12" cy="12" r="10" fill="none" stroke="#C9A961" strokeWidth="1.5"
                      strokeLinecap="round"
                      initial={{ pathLength: 0 }} animate={{ pathLength: 1 }}
                      transition={{ duration: 5, ease: "linear" }} />
                  </svg>
                )}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-3">
            <button onClick={prev} aria-label="Previous service"
              className="w-11 h-11 rounded-full border border-stroke text-muted hover:text-text-primary hover:border-white/30 transition-colors duration-300 flex items-center justify-center">
              ←
            </button>
            <button onClick={next} aria-label="Next service"
              className="w-11 h-11 rounded-full border border-stroke text-muted hover:text-text-primary hover:border-white/30 transition-colors duration-300 flex items-center justify-center">
              →
            </button>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ============ Clients We Serve: 3D orbit carousel ============
   Cards circle slowly on a 3D ring but always face the viewer, so every
   name stays readable (the reference design loses labels on turned cards).
   Hovering the stage pauses the orbit so cards can be clicked. */
const galleryItems = [
  { img: "assets/img/couple-home.jpg", label: "Families", pos: "50% 35%", href: "families.html" },
  { img: "assets/img/physician.jpg", label: "Professionals", pos: "50% 25%", href: "professionals.html" },
  { img: "assets/img/retirees-golf.jpg", label: "Retirees", pos: "50% 30%", href: "retirees.html" },
  { img: "assets/img/blog-workshop-owner.jpg", label: "Business Owners", pos: "50% 25%", href: "business-owners.html" },
  { img: "assets/img/Foundation.jpg", label: "Foundations & Endowments", pos: "50% 40%", href: "foundations-endowments.html" },
  { img: "assets/img/Executive2.jpg", label: "Executives", pos: "50% 15%", href: "executives.html" },
  { img: "assets/img/institution.jpg", label: "Institutions", pos: "50% 30%", href: "institutional.html" },
];

function ClientOrbit() {
  const stageRef = React.useRef(null);
  const cardRefs = React.useRef([]);
  const angleRef = React.useRef(0);
  const speedRef = React.useRef(1);          // eases to 0 on hover, 1 when free
  const N = galleryItems.length;

  React.useEffect(() => {
    const stage = stageRef.current;
    let raf = null, last = performance.now();
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const REV_MS = 22000;                    // one revolution ~22s — unhurried but never a wait

    const layout = () => {
      const cw = stage.offsetWidth;
      const cardW = cw < 640 ? 225 : 310;
      const rx = Math.max(cardW * 0.85, Math.min(cw / 2 - cardW / 2 - 8, 500));
      for (let i = 0; i < N; i++) {
        const el = cardRefs.current[i];
        if (!el) continue;
        const a = angleRef.current + (i * Math.PI * 2) / N;
        const depth = (Math.cos(a) + 1) / 2;               // 1 = front, 0 = back
        const x = Math.sin(a) * rx;
        const y = -46 * (1 - depth);                       // back row floats up a touch
        const scale = 0.58 + 0.42 * depth;
        el.style.width = cardW + "px";
        el.style.transform =
          "translate(-50%,-50%) translate(" + x.toFixed(1) + "px," + y.toFixed(1) + "px) scale(" + scale.toFixed(3) + ")";
        el.style.zIndex = String(10 + Math.round(depth * 100));
        el.style.opacity = (0.38 + 0.62 * depth).toFixed(3);
        el.style.filter = "brightness(" + (0.55 + 0.45 * depth).toFixed(3) + ")";
      }
    };

    const step = (now) => {
      const dt = Math.min(now - last, 100);
      last = now;
      angleRef.current += (dt / REV_MS) * Math.PI * 2 * speedRef.current;
      layout();
      raf = requestAnimationFrame(step);
    };

    layout();                                // paint the ring immediately, before the first frame
    if (!reduce) raf = requestAnimationFrame(step);

    const easeTo = (target) => {
      const tick = () => {
        const s = speedRef.current;
        const next = s + (target - s) * 0.12;
        speedRef.current = Math.abs(next - target) < 0.01 ? target : next;
        if (speedRef.current !== target) requestAnimationFrame(tick);
      };
      tick();
    };
    const pause = () => easeTo(0);
    const resume = () => easeTo(1);
    stage.addEventListener("pointerenter", pause);
    stage.addEventListener("pointerleave", resume);
    window.addEventListener("resize", layout);

    return () => {
      if (raf) cancelAnimationFrame(raf);
      stage.removeEventListener("pointerenter", pause);
      stage.removeEventListener("pointerleave", resume);
      window.removeEventListener("resize", layout);
    };
  }, []);

  return (
    <section id="serve" className="relative bg-bg pt-8 md:pt-10 pb-16 md:pb-20 overflow-hidden">
      {/* soft gold pool of light behind the ring */}
      <div className="absolute inset-x-0 bottom-0 h-[60%] pointer-events-none"
           style={{ background: "radial-gradient(ellipse 55% 50% at 50% 100%, rgba(169,142,74,0.14), transparent 70%)" }} />

      <div className="relative max-w-[1200px] mx-auto px-6 md:px-24 xl:px-16">
        <motion.div
          initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }}
          transition={{ duration: 1, ease: [0.25, 0.1, 0.25, 1] }}
          viewport={{ once: true, margin: "-100px" }}
          className="text-center max-w-xl mx-auto">
          <div className="flex items-center justify-center gap-3 mb-4">
            <span className="w-8 h-px bg-stroke" />
            <span className="text-xs text-muted uppercase tracking-[0.3em] font-body">Who We Serve</span>
            <span className="w-8 h-px bg-stroke" />
          </div>
          <h2 className="text-4xl md:text-5xl lg:text-6xl font-body font-light tracking-tight">
            Clients we <span className="font-display italic">serve</span>
          </h2>
          <p className="text-muted mt-4 font-body text-sm md:text-base">
            Families, business owners, professionals, retirees, foundations &amp; endowments,
            and institutions — each with a portfolio built around what their wealth actually has to do.
          </p>
        </motion.div>
      </div>

      {/* orbit stage */}
      <div ref={stageRef} className="relative w-full max-w-[1280px] mx-auto h-[520px] md:h-[620px] mt-4 md:mt-6">
        {galleryItems.map((item, i) => (
          <a key={item.label} href={item.href}
             ref={(el) => { cardRefs.current[i] = el; }}
             className="group absolute left-1/2 top-1/2 block rounded-3xl overflow-hidden border border-white/10 bg-surface shadow-2xl shadow-black/50 will-change-transform"
             style={{ aspectRatio: "3 / 4" }}
             aria-label={item.label}>
            <img src={item.img} alt={item.label} loading="lazy" draggable="false"
                 className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                 style={{ objectPosition: item.pos }} />
            {/* solid readable name plate — always facing the viewer */}
            <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/90 via-black/55 to-transparent pt-12 pb-4 px-4">
              <p className="text-white font-body font-semibold text-base md:text-lg leading-snug"
                 style={{ textShadow: "0 1px 8px rgba(0,0,0,0.9)" }}>
                {item.label}
              </p>
              <p className="text-[11px] uppercase tracking-[0.18em] font-body text-white/70 mt-1 inline-flex items-center gap-1.5">
                <span className="w-4 h-px accent-gradient" /> Explore <span aria-hidden="true">→</span>
              </p>
            </div>
          </a>
        ))}
      </div>

      <div className="relative text-center mt-2 md:mt-4">
        <p className="text-xs text-muted font-body mb-6 hidden md:block">Hover to pause — click a card to explore</p>
        <div className="inline-flex">
          <GradientButton href="families.html">Find your fit <span aria-hidden="true">→</span></GradientButton>
        </div>
      </div>
    </section>
  );
}

/* ============ Newsletter Signup — futuristic overlay card ============ */
function NewsletterSignup() {
  const [firstName, setFirstName] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [status, setStatus] = React.useState("idle"); // idle | sending | error | done
  const submitted = status === "done";

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!firstName.trim() || !email.trim() || status === "sending") return;
    setStatus("sending");
    fetch("https://formspree.io/f/xzdneooq", {
      method: "POST",
      headers: { "Content-Type": "application/json", Accept: "application/json" },
      body: JSON.stringify({
        firstName: firstName.trim(),
        email: email.trim(),
        form_type: "newsletter",
        _subject: "New newsletter signup",
      }),
    })
      .then((r) => { if (r.ok) setStatus("done"); else throw new Error("bad status"); })
      .catch(() => setStatus("error"));
  };

  return (
    <div className="relative max-w-[900px] mx-auto mb-16 rounded-[28px] border border-white/10 bg-surface/80 backdrop-blur-xl shadow-2xl shadow-black/60 overflow-hidden text-left">
      <div className="absolute inset-0 pointer-events-none"
           style={{ background: "radial-gradient(ellipse 70% 90% at 15% 50%, rgba(169,142,74,0.18), transparent 65%)" }} />
      <div className="relative grid md:grid-cols-[2fr_3fr]">
        <div className="relative overflow-hidden h-48 md:h-auto">
          <img src="assets/img/newsletter-neon-head.jpg" alt=""
               className="absolute inset-0 w-full h-full object-cover"
               style={{ objectPosition: "50% 30%" }} />
          <div className="md:hidden absolute inset-x-0 bottom-0 h-16 bg-gradient-to-b from-transparent to-[#0f0f0f]" />
          <div className="hidden md:block absolute inset-y-0 right-0 w-16 bg-gradient-to-r from-transparent to-[#0f0f0f]" />
        </div>
        <div className="p-8 md:p-10">
          {submitted ? (
            <div className="flex flex-col items-start justify-center h-full py-6">
              <span className="inline-flex items-center gap-2 text-sm font-body text-white/80 mb-3">
                <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse-dot" /> You're on the list
              </span>
              <h3 className="text-3xl md:text-4xl font-display italic mb-3">Welcome, {firstName.trim()}.</h3>
              <p className="text-muted font-body text-sm">
                Our next market insight will land in your inbox at {email.trim()}. No spam, unsubscribe anytime.
              </p>
            </div>
          ) : (
            <form onSubmit={handleSubmit}>
              <h3 className="text-3xl md:text-4xl font-display mb-3">
                Subscribe for <span className="italic">Monthly Insights</span>
              </h3>
              <p className="text-muted font-body text-sm mb-6">
                Join our community of subscribers and receive market perspective, planning ideas,
                and firm updates straight to your inbox. Quick, easy, and free.
              </p>
              <p className="text-xs uppercase tracking-[0.2em] text-white/60 font-body mb-3">Stay up to date</p>
              <div className="flex flex-col sm:flex-row gap-3">
                <input
                  type="text" required value={firstName}
                  onChange={(e) => setFirstName(e.target.value)}
                  placeholder="First name" aria-label="First name"
                  className="flex-1 min-w-0 rounded-xl bg-white/5 border border-white/15 px-4 py-3 text-sm font-body text-text-primary placeholder-white/40 outline-none focus:border-[#C9A961] focus:ring-1 focus:ring-[#C9A961]/50 transition-colors" />
                <input
                  type="email" required value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="Enter your email address" aria-label="Email address"
                  className="flex-[1.4] min-w-0 rounded-xl bg-white/5 border border-white/15 px-4 py-3 text-sm font-body text-text-primary placeholder-white/40 outline-none focus:border-[#C9A961] focus:ring-1 focus:ring-[#C9A961]/50 transition-colors" />
              </div>
              <button type="submit" disabled={status === "sending"}
                className="mt-3 w-full sm:w-auto accent-gradient rounded-xl px-8 py-3 text-sm font-body font-semibold text-black hover:opacity-90 transition-opacity disabled:opacity-60 disabled:cursor-wait">
                {status === "sending" ? "Subscribing…" : "Subscribe"}
              </button>
              {status === "error" && (
                <p className="mt-3 text-sm font-body text-red-400">
                  Something went wrong — please try again, or email us at clientservices@princetonam.com.
                </p>
              )}
            </form>
          )}
        </div>
      </div>
    </div>
  );
}
